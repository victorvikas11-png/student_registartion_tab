<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Registration</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 40px; background-color: #eef2f3; }
        .form-container { background: white; padding: 30px; border-radius: 12px; max-width: 450px; margin: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #333; text-align: center; }
        label { font-weight: bold; display: block; margin-top: 15px; color: #555; }
        input { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; background: #2ecc71; color: white; border: none; padding: 12px; margin-top: 25px; cursor: pointer; border-radius: 6px; font-size: 16px; font-weight: bold; }
        button:hover { background: #27ae60; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Student Entry Form</h2>
        <form action="/submit" method="POST">
            <label>Student Name</label>
            <input type="text" name="name" placeholder="Full Name" required>

            <label>Roll Number</label>
            <input type="text" name="roll" placeholder="Enrollment No." required>

            <label>Email Address</label>
            <input type="email" name="email" placeholder="example@gmail.com" required>

            <label>Phone Number</label>
            <input type="tel" name="phone" placeholder="Contact Number" required>

            <label>Course</label>
            <input type="text" name="course" placeholder="e.g. B.Tech Computer Science" required>

            <button type="submit">Submit Registration</button>
        </form>
    </div>
</body>
</html>
